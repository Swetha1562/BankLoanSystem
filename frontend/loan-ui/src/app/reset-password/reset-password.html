<app-navbar></app-navbar>
<div class="auth-page">
  <div class="auth-left">
    <h1>Astra Bank</h1>
    <p>
      Reset your password securely and continue accessing your loan management portal.
    </p>
  </div>
 
  <div class="auth-right">
    <div class="auth-card">
      <div class="form-header">
        <span class="mini-badge">Reset Password</span>
        <h2>Create New Password</h2>
        <p>Set a strong new password to continue securely.</p>
      </div>
 
      <div class="alert error-alert" *ngIf="message">
        {{ message }}
      </div>
 
      <div class="alert success-alert" *ngIf="successMessage">
        {{ successMessage }}
      </div>
 
      <form (ngSubmit)="resetPassword()" #resetForm="ngForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            class="form-control readonly-input"
            type="email"
            [(ngModel)]="email"
            name="email"
            readonly
          />
        </div>
 
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="password-wrapper">
            <input
              class="form-control"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="newPassword"
              name="newPassword"
              required
              #newPasswordRef="ngModel"
              [class.invalid]="resetForm.submitted && newPasswordRef.invalid"
              placeholder="Enter new password"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="showPassword = !showPassword"
            >
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>
 
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="password-wrapper">
            <input
              class="form-control"
              [type]="showConfirmPassword ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required
              #confirmPasswordRef="ngModel"
              [class.invalid]="resetForm.submitted && confirmPasswordRef.invalid"
              placeholder="Confirm new password"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="showConfirmPassword = !showConfirmPassword"
            >
              {{ showConfirmPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
 
          <small class="password-hint">
            Must contain 8+ characters, uppercase, number &amp; special character
          </small>
        </div>
 
        <button
          type="submit"
          class="btn-primary"
          style="width: 100%;"
          [disabled]="isLoading"
        >
          <span *ngIf="!isLoading">Reset Password</span>
          <span *ngIf="isLoading">Resetting...</span>
        </button>
      </form>
    </div>
  </div>
</div>
