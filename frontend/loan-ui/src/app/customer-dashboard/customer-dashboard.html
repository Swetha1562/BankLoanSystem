<div class="page-container">

  <div class="topbar">
    <div>
      <h1 class="page-title">Customer Dashboard</h1>
      <p class="text-muted">Track your loan activity and decisions</p>
    </div>

    <div class="topbar-actions">
      <button class="btn-primary" routerLink="/apply-loan">Apply Loan</button>
      <button class="btn-secondary" routerLink="/my-loans">My Loans</button>
      <button class="btn-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="metric-grid">
    <div class="metric-card">
      <h4>Total Loans</h4>
      <div class="metric-value">{{ totalLoans }}</div>
      <div class="metric-note">Applications submitted</div>
    </div>

    <div class="metric-card">
      <h4>Approved</h4>
      <div class="metric-value">{{ approvedLoans }}</div>
      <div class="metric-note">Successfully approved</div>
    </div>

    <div class="metric-card">
      <h4>Pending</h4>
      <div class="metric-value">{{ pendingLoans }}</div>
      <div class="metric-note">Under review</div>
    </div>

    <div class="metric-card">
      <h4>Rejected</h4>
      <div class="metric-value">{{ rejectedLoans }}</div>
      <div class="metric-note">Declined applications</div>
    </div>
  </div>

</div>
