<div class="auth-page">
  <div class="auth-left">
    <h1>Bank Loan System</h1>
    <p>
      Create your account to apply for loans, track applications,
      and access a modern loan management dashboard.
    </p>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2>Register</h2>
      <p>Create your account to get started.</p>

      <!-- ✅ IMPORTANT: ngSubmit -->
      <form (ngSubmit)="onRegister()">
        
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input
            class="form-control"
            type="text"
            [(ngModel)]="fullName"
            name="fullName"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            class="form-control"
            type="email"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            class="form-control"
            type="password"
            [(ngModel)]="password"
            name="password"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>
          <select
            class="form-control"
            [(ngModel)]="role"
            name="role"
          >
            <option value="Customer">Customer</option>
            <option value="Officer">Officer</option>
          </select>
        </div>

        <!-- ✅ submit button -->
        <button
          type="submit"
          class="btn-primary"
          style="width: 100%; margin-top: 8px;"
        >
          Register
        </button>

        <!-- ✅ routerLink for navigation -->
        <div style="margin-top: 18px; text-align: center;">
          <a
            routerLink="/login"
            style="color: var(--accent-purple); font-weight: 600;"
          >
            Back to Login
          </a>
        </div>

        <p *ngIf="message" class="text-muted" style="margin-top: 16px;">
          {{ message }}
        </p>
      </form>
    </div>
  </div>
</div>
