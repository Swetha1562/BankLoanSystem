<div class="page-container">
  <div class="topbar">
    <div>
      <h1 class="page-title">My Loans</h1>
      <p class="text-muted">
        Review all your submitted applications and their latest status.
      </p>
    </div>

   
  </div>

  <div class="metric-grid" style="margin-bottom: 22px;">
    <div class="metric-card">
      <h4>Total Loans</h4>
      <div class="metric-value">{{ loans.length }}</div>
      <div class="metric-note">Applications submitted by you</div>
    </div>
  </div>

  <div class="table-wrapper" *ngIf="loans.length > 0; else emptyState">
    <table class="styled-table">
      <thead>
        <tr>
          <th>Loan Type</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let loan of loans">
          <td>{{ loan.loanType }}</td>
          <td>₹ {{ loan.amount }}</td>
          <td>
            <span
              class="status-badge"
              [ngClass]="{
                'status-pending': loan.status === 'Pending',
                'status-approved': loan.status === 'Approved',
                'status-rejected': loan.status === 'Rejected'
              }"
            >
              {{ loan.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #emptyState>
    <div class="section-card empty-state">
      <h3 style="margin-top: 0; color: var(--text-white);">No loans found</h3>
      <p class="text-muted">
        You have not submitted any loan applications yet.
      </p>
      <button class="btn-primary" type="button" routerLink="/apply-loan">
        Apply for Loan
      </button>
    </div>
  </ng-template>
</div>
