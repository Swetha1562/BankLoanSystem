<div class="page-container">

  <div class="topbar">
    <div>
      <h1 class="page-title">Officer Dashboard</h1>
      <p class="text-muted">Review and manage loan applications</p>
    </div>

    <div class="topbar-actions">
      <button class="btn-primary" routerLink="/all-loans">View Applications</button>
      <button class="btn-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="metric-grid">
    <div class="metric-card">
      <h4>Total Applications</h4>
      <div class="metric-value">{{ totalLoans }}</div>
      <div class="metric-note">All submitted loans</div>
    </div>

    <div class="metric-card">
      <h4>Pending</h4>
      <div class="metric-value">{{ pendingLoans }}</div>
      <div class="metric-note">Need decision</div>
    </div>

    <div class="metric-card">
      <h4>Approved</h4>
      <div class="metric-value">{{ approvedLoans }}</div>
      <div class="metric-note">Accepted loans</div>
    </div>

    <div class="metric-card">
      <h4>Rejected</h4>
      <div class="metric-value">{{ rejectedLoans }}</div>
      <div class="metric-note">Rejected loans</div>
    </div>
  </div>

</div>
