<div class="page-shell">
 
  <aside class="sidebar">
    <div class="sidebar-brand">
    </div>
 
    <nav class="sidebar-nav">
      <a
        class="nav-link"
        routerLink="/officer-dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Dashboard
      </a>
 
      <a
        class="nav-link"
        routerLink="/all-loans"
        routerLinkActive="active"
      >
        All Loans
      </a>
 
      <!--<a class="nav-link logout-link" (click)="logout()">
        Logout
      </a>-->
    </nav>
  </aside>
 
  <main class="main-content">
    <section class="page-header">
      <p class="eyebrow">OFFICER PORTAL</p>
      <h1>Officer Dashboard</h1>
      <p>Review and manage loan applications</p>
    </section>
 
    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>
 
    <section class="summary-row">
      <button class="summary-card clickable" type="button" (click)="goToAllLoans('all')">
        <h4>Total Applications</h4>
        <div class="summary-value">{{ totalLoans }}</div>
        <div class="summary-note">All submitted loans</div>
      </button>
 
      <button class="summary-card clickable" type="button" (click)="goToAllLoans('pending')">
        <h4>Pending</h4>
        <div class="summary-value">{{ pendingLoans }}</div>
        <div class="summary-note">Need decision</div>
      </button>
 
      <button class="summary-card clickable" type="button" (click)="goToAllLoans('approved')">
        <h4>Approved</h4>
        <div class="summary-value">{{ approvedLoans }}</div>
        <div class="summary-note">Accepted loans</div>
      </button>
 
      <button class="summary-card clickable" type="button" (click)="goToAllLoans('rejected')">
        <h4>Rejected</h4>
        <div class="summary-value">{{ rejectedLoans }}</div>
        <div class="summary-note">Rejected loans</div>
      </button>
    </section>
  </main>
</div>
